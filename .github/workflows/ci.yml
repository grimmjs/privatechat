name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm install
      - name: Syntax check
        run: |
          for f in $(find . -name node_modules -prune -o -name '*.js' -print); do
            node --check "$f"
          done
      - name: Smoke test (boot + /health)
        run: |
          PORT=3010 node server.js &
          PID=$!
          sleep 3
          curl -fsS http://127.0.0.1:3010/health
          kill $PID

  android:
    runs-on: ubuntu-latest
    if: false  # enable when Capacitor android/ folder is committed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install deps
        run: npm install
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
