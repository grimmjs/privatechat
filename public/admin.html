<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard Admin — Private Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    :root {
      --bg: #0a0a0c;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --primary: #3b82f6;
      --primary-glow: rgba(59, 130, 246, 0.3);
      --danger: #ef4444;
      --success: #10b981;
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    header {
      margin-bottom: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-area h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-area p {
      margin: 4px 0 0;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Auth View */
    #authBox {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      max-width: 500px;
      margin: 100px auto;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .auth-icon {
      width: 64px;
      height: 64px;
      background: var(--primary-glow);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      color: var(--primary);
    }

    .auth-input-group {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input[type="password"], input[type="text"], input[type="search"] {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 18px;
      color: #fff;
      font-size: 15px;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-glow);
    }

    .btn-login {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-login:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    /* Dashboard Layout */
    .admin-nav {
      display: flex;
      gap: 8px;
      background: var(--card-bg);
      padding: 6px;
      border-radius: 16px;
      border: 1px solid var(--card-border);
      margin-bottom: 32px;
      overflow-x: auto;
    }

    .nav-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 10px 20px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .nav-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .nav-btn.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    /* Stats Grid */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 24px;
      transition: transform 0.2s;
    }

    .stat-card:hover { transform: translateY(-4px); border-color: var(--primary); }

    .stat-val { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
    .stat-label { color: var(--text-muted); font-size: 14px; font-weight: 500; }

    /* Tables */
    .panel {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 24px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 16px;
      border-bottom: 1px solid var(--card-border);
    }

    td {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 14px;
    }

    tr:hover td { background: rgba(255,255,255,0.01); }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .pill.success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .pill.danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

    .btn-action {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      color: #fff;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-action:hover { background: var(--primary); border-color: var(--primary); }
    .btn-action.danger:hover { background: var(--danger); border-color: var(--danger); }

    .hidden { display: none !important; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    @media (max-width: 768px) {
      .admin-container { padding: 20px 16px; }
      .logo-area h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <header>
      <div class="logo-area">
        <h1>Console Amministratore</h1>
        <p>Monitoraggio e gestione della rete Private Chat</p>
      </div>
    </header>

    <!-- AUTH SECTION -->
    <div id="authBox">
      <div class="auth-icon">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="M8 11h8m-4-4v8"/>
        </svg>
      </div>
      <h2>Accesso Sicuro</h2>
      <p style="color:var(--text-muted); font-size:14px">Inserisci il tuo ID Sessione per continuare. Puoi trovarlo nelle Impostazioni → Sessioni dell'app.</p>
      
      <div class="auth-input-group">
        <input type="password" id="adminSession" placeholder="ID Sessione (es. sess_...)" autocomplete="off">
        <button id="adminLogin" class="btn-login" type="button">Accedi alla Console</button>
      </div>
    </div>

    <!-- MAIN APP SECTION -->
    <div id="adminApp" class="hidden">
      <nav class="admin-nav">
        <button class="nav-btn active" data-tab="dash" type="button">Dashboard</button>
        <button class="nav-btn" data-tab="reports" type="button">Segnalazioni</button>
        <button class="nav-btn" data-tab="users" type="button">Utenti</button>
        <button class="nav-btn" data-tab="audit" type="button">Log Attività</button>
        <button class="nav-btn" data-tab="metrics" type="button">Metriche Server</button>
      </nav>

      <!-- TAB: DASHBOARD -->
      <div id="tab-dash">
        <div class="stat-grid" id="summaryGrid">
          <!-- Stats populated via JS -->
        </div>
      </div>

      <!-- TAB: REPORTS -->
      <div id="tab-reports" class="panel hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
          <select id="reportStatus" style="background:rgba(255,255,255,0.05); border:1px solid var(--card-border); color:#fff; padding:8px 12px; border-radius:10px">
            <option value="open">Aperte</option>
            <option value="resolved">Risolte</option>
            <option value="">Tutte</option>
          </select>
          <button class="btn-action" id="reportRefresh" type="button">Aggiorna</button>
        </div>
        <div style="overflow-x:auto">
          <table id="reportsTable"></table>
        </div>
      </div>

      <!-- TAB: USERS -->
      <div id="tab-users" class="panel hidden">
        <div style="display:flex; gap:12px; margin-bottom:20px">
          <input type="search" id="userQ" placeholder="Cerca per username o codice..." style="flex:1">
          <button class="btn-action" id="userSearch" type="button">Cerca</button>
        </div>
        <div style="overflow-x:auto">
          <table id="usersTable"></table>
        </div>
      </div>

      <!-- TAB: AUDIT -->
      <div id="tab-audit" class="panel hidden">
        <div style="display:flex; justify-content:flex-end; margin-bottom:20px">
          <button class="btn-action" id="auditRefresh" type="button">Aggiorna</button>
        </div>
        <div style="overflow-x:auto">
          <table id="auditTable"></table>
        </div>
      </div>

      <!-- TAB: METRICS -->
      <div id="tab-metrics" class="panel hidden">
        <pre id="metricsOut" style="background:rgba(0,0,0,0.3); padding:20px; border-radius:16px; border:1px solid var(--card-border); font-family:'Courier New', monospace; font-size:13px; color:#10b981; overflow:auto"></pre>
      </div>
    </div>
  </div>

  <script src="/js/admin.js" defer></script>
</body>
</html>
